body:
  text: 決疑要注辛繕嘗隱居華陰光徵不仕至有大鳥高五尺五色備舉而多青栖繕槐樹旬時不去弘農太守以聞詔問百僚咸以為鳳太史今蔡衡對曰凡象鳳者有五多赤色者鳳多青色者鸞多黃色者雛多紫色者鵷多白色者鵠此鳥多青乃鷥非鳳也上善其言秦除衮冕之制唯為玄衣綘裳一具而已漢興亦如之中興後明帝永平中使諸儒案古衣圖書始復造衮冕之服至今用之几筵在殿堂之上唯天子召床其餘皆鋪席前設筵几天子之殿東西九筵南北七筵故曰度堂以筵度室以几也漢武鑿昆明池極深悉是灰墨無復土舉朝不解以問東方朔朔曰臣愚不足以知之可試問西域胡帝以朔不知難以移問至後漢明帝時外國道人入來洛陽時有憶方朔言者乃試以武帝時灰墨問之胡人云經云天地大劫將盡則劫燒此劫燒之餘乃知朔言有者尚書臺召人用虎爪書告下用波書皆不可卒學以防矯詐宴之與會威儀不同也會則隨五時朝服庭設金石懸虎賁著旄頭文衣鶡尾以列陛宴則服常服設絲竹之樂唯宿衛者列伏大會于太極殿小會于東西堂
